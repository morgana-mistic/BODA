<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuestra Boda</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

#entrar{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);

    padding:15px 35px;

    border:none;
    border-radius:50px;

    background:white;

    font-size:1.2rem;

    cursor:pointer;

    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<img src="pareja.png" alt="Nuestra Boda">

<button id="entrar">
🎵 Activar Música
</button>

<audio id="audio"></audio>

<script>

const canciones = [
    "tema1.mp3",
    "tema2.mp3",
    "tema3.mp3"
];

let indice = 0;

const reproductor = document.getElementById("audio");

function reproducirPlaylist(){

    reproductor.src = canciones[indice];
    reproductor.play();

    document.getElementById("entrar").style.display = "none";
}

reproductor.addEventListener("ended", () => {

    indice++;

    if(indice < canciones.length){

        reproductor.src = canciones[indice];
        reproductor.play();
    }
});

document.getElementById("entrar")
.addEventListener("click", reproducirPlaylist);

</script>

</body>
</html>
