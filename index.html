<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuestra Boda</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

/* FONDO */

#portada{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    background:white;
}
/* BOTONES PRINCIPALES */

#menu{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:20px;
    z-index:20;
}

#menu button{
    border:none;
    border-radius:40px;
    padding:18px 30px;
    font-size:1.1rem;
    cursor:pointer;

    background:rgba(255,248,235,0.92);

    backdrop-filter:blur(10px);

    box-shadow:0 8px 25px rgba(0,0,0,.25);
}

/* VENTANAS */

.modal{
    position:fixed;
    inset:0;

    display:none;

    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.20);

    z-index:100;
}

/* TARJETA */

.tarjeta{

    width:min(92vw,700px);
    max-height:85vh;

    overflow:auto;

    padding:30px;

    border-radius:25px;

    background:rgba(255,255,255,.25);

    backdrop-filter:blur(18px);

    box-shadow:0 20px 50px rgba(0,0,0,.25);

    text-align:center;
}

/* TITULOS */

.tarjeta h2{
    margin-bottom:25px;
}

/* MUSICA */

.tema{

    width:100%;

    margin:10px 0;

    padding:16px;

    border:none;

    border-radius:15px;

    cursor:pointer;

    background:rgba(255,248,235,.9);

    font-size:1rem;
}

#reproduciendo{

    margin:25px 0;

    font-weight:bold;
}

/* CONTROLES */

.controles{

    display:flex;

    justify-content:center;

    gap:10px;

    flex-wrap:wrap;
}

.controles button{

    border:none;

    border-radius:30px;

    padding:12px 20px;

    cursor:pointer;

    background:rgba(255,248,235,.9);
}

/* GALERIA */

.foto{

    width:100%;

    margin:15px 0;

    border-radius:15px;
}

</style>
</head>

<body>

<img id="portada" src="FP.png" alt="Nuestra Boda">

<div id="menu">

    <button id="abrirMusica">
        🎵 Nuestra Música
    </button>

    <button id="abrirFotos">
        📷 Nuestras Fotos
    </button>

</div>

<!-- MUSICA -->

<div class="modal" id="modalMusica">

    <div class="tarjeta">

        <h2>🎵 Nuestra Música</h2>

        <button class="tema" onclick="reproducirTema(0)">
            Lo bien que suenas
        </button>

        <button class="tema" onclick="reproducirTema(1)">
            Spring 1
        </button>

        <button class="tema" onclick="reproducirTema(2)">
            Mamma Mia
        </button>

        <div id="reproduciendo">
            Ningún tema seleccionado
        </div>

        <div class="controles">

            <button onclick="pausar()">
                ⏸ Pausar
            </button>

            <button onclick="reanudar()">
                ▶ Reanudar
            </button>

            <button onclick="cerrarMusica()">
                ✕ Cerrar
            </button>

        </div>

    </div>

</div>

<!-- FOTOS -->

<div class="modal" id="modalFotos">

    <div class="tarjeta">

        <h2>📷 Nuestras Fotos</h2>

        <img class="foto" src="1.jpeg">
        <img class="foto" src="2.jpeg">
        <img class="foto" src="3.jpeg">
        <img class="foto" src="4.jpeg">
        <img class="foto" src="6.jpeg">
        <img class="foto" src="7.jpeg">
        <img class="foto" src="8.jpeg">
        <img class="foto" src="10.jpeg">

        <div class="controles">

            <button onclick="cerrarFotos()">
                ✕ Cerrar
            </button>

        </div>

    </div>

</div>

<audio id="audio"></audio>

<script>

const canciones = [

    "Lo bien que suenas.mp3",
    "spring 1.mp3",
    "Mamma Mia.mp3"

];

const nombres = [

    "Lo bien que suenas",
    "Spring 1",
    "Mamma Mia"

];

const reproductor = document.getElementById("audio");

function reproducirTema(indice){

    reproductor.src = canciones[indice];

    reproductor.play();

    document.getElementById("reproduciendo").innerHTML =
    "🎵 Reproduciendo:<br><br>" + nombres[indice];
}

function pausar(){

    reproductor.pause();
}

function reanudar(){

    reproductor.play();
}

document.getElementById("abrirMusica")
.addEventListener("click", ()=>{

    document.getElementById("modalMusica").style.display="flex";
});

document.getElementById("abrirFotos")
.addEventListener("click", ()=>{

    document.getElementById("modalFotos").style.display="flex";
});

function cerrarMusica(){

    document.getElementById("modalMusica").style.display="none";
}

function cerrarFotos(){

    document.getElementById("modalFotos").style.display="none";
}

</script>

<script data-goatcounter="https://morgana.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

</body>
</html>
