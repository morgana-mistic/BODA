<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuestra Boda</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

#menu{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);

    display:flex;
    gap:20px;
}

#menu button{
    border:none;
    border-radius:50px;
    padding:18px 30px;
    font-size:1.1rem;
    cursor:pointer;
    background:white;
    box-shadow:0 4px 15px rgba(0,0,0,0.25);
}

</style>

</head>

<body>

<img src="pareja.png" alt="Nuestra Boda">

<div id="menu">

```
<button id="musica">
    🎵 Nuestra Música
</button>

<button id="fotos">
    📷 Nuestras Fotos
</button>
```

</div>

<audio id="audio"></audio>

<script>

const canciones = [
    "tema1.mp3",
    "tema2.mp3",
    "tema3.mp3"
];

let indice = 0;

const reproductor = document.getElementById("audio");

function reproducirPlaylist(){

    document.getElementById("menu").style.display = "none";

    reproductor.src = canciones[indice];
    reproductor.play();

}

reproductor.addEventListener("ended", () => {

    indice++;

    if(indice < canciones.length){

        reproductor.src = canciones[indice];
        reproductor.play();

    }

});

document.getElementById("musica")
.addEventListener("click", reproducirPlaylist);

</script>

</body>
</html>
