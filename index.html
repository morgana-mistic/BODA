<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuestra Boda</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
}

img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}
#entrar{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);

    padding:15px 35px;

    border:none;
    border-radius:50px;

    background:white;

    font-size:1.2rem;
    cursor:pointer;

    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<img src="pareja.png" alt="Nuestra Boda">

<button id="entrar">
✨ Entrar ✨
</button>

</body>
</html>
